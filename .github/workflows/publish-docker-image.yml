name: Publish Docker image to Docker Hub

on:
  push:
    branches:
      - main # 或者您的主分支名称，例如 master
  # 也可以在创建标签时触发
  # release:
  #   types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    # permissions: # 对于 Docker Hub，不需要特殊的 'packages' 权限，但 'contents: read' 仍然需要
    #   contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }} # 使用 DOCKERHUB_USERNAME 和仓库名
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            # 您也可以添加其他标签类型，例如基于 Git 标签的
            # type=ref,event=tag

      - name: Build and push Docker image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}